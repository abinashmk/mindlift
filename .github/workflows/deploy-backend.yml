name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  test:
    name: Run tests before deploy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mindlift
          POSTGRES_PASSWORD: mindlift
          POSTGRES_DB: mindlift_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://mindlift:mindlift@localhost:5432/mindlift_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-jwt-secret-not-for-production
      REFRESH_TOKEN_SECRET: ci-refresh-secret-not-for-production
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Alembic migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest tests/ --cov=app --cov-fail-under=80 -q

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
        run: |
          docker build -t $ECR_REGISTRY/mindlift-backend:$IMAGE_TAG \
            -t $ECR_REGISTRY/mindlift-backend:$ENVIRONMENT-latest \
            ./backend
          docker push $ECR_REGISTRY/mindlift-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/mindlift-backend:$ENVIRONMENT-latest

      - name: Run Alembic migrations
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
        run: |
          docker run --rm \
            -e DATABASE_URL=$DATABASE_URL \
            -e JWT_SECRET=$JWT_SECRET \
            -e REFRESH_TOKEN_SECRET=$REFRESH_TOKEN_SECRET \
            $ECR_REGISTRY/mindlift-backend:$IMAGE_TAG \
            alembic upgrade head

      - name: Deploy to EC2 via SSM
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          aws ssm send-command \
            --targets "Key=tag:Environment,Values=$ENVIRONMENT" \
            --document-name "AWS-RunShellScript" \
            --parameters commands=[
              "docker pull $ECR_REGISTRY/mindlift-backend:$IMAGE_TAG",
              "docker stop mindlift-api || true",
              "docker rm mindlift-api || true",
              "docker run -d --name mindlift-api --restart unless-stopped -p 8000:8000 --env-file /etc/mindlift/.env $ECR_REGISTRY/mindlift-backend:$IMAGE_TAG uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4",
              "docker stop mindlift-worker || true",
              "docker rm mindlift-worker || true",
              "docker run -d --name mindlift-worker --restart unless-stopped --env-file /etc/mindlift/.env $ECR_REGISTRY/mindlift-backend:$IMAGE_TAG celery -A app.worker worker --loglevel=info"
            ]

      - name: Wait for service to stabilise
        run: sleep 30

      - name: Smoke test — health endpoint
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
        run: |
          if [ "$ENVIRONMENT" = "production" ]; then
            BASE_URL="https://api.mindlift.app"
          else
            BASE_URL="https://api-staging.mindlift.app"
          fi
          echo "Checking $BASE_URL/health ..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/health")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 3 attempts."
          exit 1

      - name: Smoke test — auth endpoint reachable
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
        run: |
          if [ "$ENVIRONMENT" = "production" ]; then
            BASE_URL="https://api.mindlift.app"
          else
            BASE_URL="https://api-staging.mindlift.app"
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$BASE_URL/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@example.invalid","password":"invalid"}')
          # Expect 401 (bad creds) or 422 (validation) — not 500/502/503
          if [ "$STATUS" = "500" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
            echo "Auth endpoint returned server error: HTTP $STATUS"
            exit 1
          fi
          echo "Auth endpoint reachable: HTTP $STATUS"

      - name: Notify deployment
        if: always()
        run: echo "Deployment to ${{ github.event.inputs.environment || 'staging' }} ${{ job.status }}"
